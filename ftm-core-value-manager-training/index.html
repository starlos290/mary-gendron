<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead to Empower — Manager Training</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a3a2a;
    --forest-light: #2d5a42;
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --cream: #f5f0e8;
    --cream-dark: #ede5d5;
    --charcoal: #2a2a2a;
    --muted: #7a7a6a;
    --white: #ffffff;
    --trust: #2d5a42;
    --commitment: #8b3a3a;
    --adaptability: #3a5a7a;
    --collaboration: #6a3a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SPLASH SCREEN */
  #splash {
    position: fixed; inset: 0;
    background: var(--forest);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; transform: translateY(-20px); }

  .splash-label {
    font-family: 'DM Mono', monospace;
    color: var(--gold);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.3s forwards;
  }
  .splash-title {
    font-family: 'Playfair Display', serif;
    color: var(--white);
    font-size: clamp(2.8rem, 7vw, 5rem);
    line-height: 1.05;
    text-align: center;
    max-width: 700px;
    padding: 0 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.5s forwards;
  }
  .splash-title em { color: var(--gold); font-style: italic; }
  .splash-sub {
    font-size: 1rem;
    color: rgba(255,255,255,0.6);
    margin-top: 1.2rem;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.7s forwards;
  }
  .splash-values {
    display: flex; gap: 1.5rem; margin-top: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.9s forwards;
    flex-wrap: wrap; justify-content: center;
  }
  .splash-value-pill {
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    padding: 0.3rem 0.9rem;
    border-radius: 100px;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
  }
  .splash-btn {
    margin-top: 3rem;
    background: var(--gold);
    color: var(--forest);
    border: none; cursor: pointer;
    padding: 0.9rem 2.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 100px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.1s forwards;
  }
  .splash-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* MAIN LAYOUT */
  #app { display: none; min-height: 100vh; }
  #app.visible { display: block; }

  /* TOP NAV */
  .topnav {
    background: var(--forest);
    padding: 0 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.15);
  }
  .nav-brand {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1.1rem;
    padding: 1rem 0;
    font-style: italic;
  }
  .nav-progress-wrap {
    display: flex; align-items: center; gap: 1rem;
  }
  .nav-progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .nav-dots { display: flex; gap: 6px; }
  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
    cursor: pointer;
  }
  .nav-dot.active { background: var(--gold); transform: scale(1.3); }
  .nav-dot.done { background: rgba(201,168,76,0.5); }

  /* SIDEBAR + CONTENT LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 56px); }

  .sidebar {
    width: 280px;
    background: var(--forest);
    flex-shrink: 0;
    padding: 2rem 0;
    display: flex; flex-direction: column;
    position: sticky; top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }

  .sidebar-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    padding: 0 1.5rem;
    margin-bottom: 0.75rem;
    margin-top: 1.5rem;
  }
  .sidebar-section-label:first-child { margin-top: 0; }

  .sidebar-item {
    padding: 0.65rem 1.5rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 0.75rem;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    position: relative;
  }
  .sidebar-item:hover { background: rgba(255,255,255,0.05); }
  .sidebar-item.active { background: rgba(201,168,76,0.12); border-left-color: var(--gold); }
  .sidebar-item .si-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .sidebar-item .si-text { font-size: 0.82rem; color: rgba(255,255,255,0.7); font-weight: 400; line-height: 1.3; }
  .sidebar-item.active .si-text { color: var(--gold-light); font-weight: 500; }
  .sidebar-item .si-check {
    margin-left: auto;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    flex-shrink: 0;
  }
  .sidebar-item.done .si-check { background: var(--gold); color: var(--forest); }

  /* CONTENT AREA */
  .content { flex: 1; padding: 3rem 4rem; max-width: 860px; }

  .module { display: none; animation: slideIn 0.4s ease; }
  .module.active { display: block; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* MODULE HEADERS */
  .module-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    font-weight: 500;
  }
  .module-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1.1;
    margin-bottom: 1rem;
  }
  .module-title em { font-style: italic; }
  .module-desc {
    font-size: 1.05rem;
    color: var(--muted);
    line-height: 1.7;
    max-width: 600px;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }

  /* DIVIDER */
  .divider {
    height: 2px;
    background: linear-gradient(90deg, var(--gold) 0%, transparent 60%);
    margin-bottom: 2.5rem;
    opacity: 0.3;
  }

  /* CARDS */
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 2rem; }
  .card {
    background: var(--white);
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    transition: all 0.2s;
  }
  .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .card-icon { font-size: 1.5rem; margin-bottom: 0.75rem; }
  .card-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.4rem; color: var(--charcoal); }
  .card-body { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

  /* VALUE BADGE */
  .value-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.3rem 0.85rem;
    border-radius: 100px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  /* CONTRAST BOX */
  .contrast-box {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(0,0,0,0.08);
    margin-bottom: 2rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  .contrast-col { padding: 1.5rem; }
  .contrast-col.bad { background: #fdf0f0; }
  .contrast-col.good { background: #f0faf4; }
  .contrast-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    font-weight: 500;
  }
  .contrast-col.bad .contrast-label { color: #c0392b; }
  .contrast-col.good .contrast-label { color: #27ae60; }
  .contrast-item {
    display: flex; align-items: flex-start; gap: 0.5rem;
    margin-bottom: 0.6rem;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--charcoal);
  }
  .contrast-item .ci-icon { flex-shrink: 0; margin-top: 2px; }

  /* SCENARIO */
  .scenario-box {
    background: var(--forest);
    color: var(--white);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .scenario-box::before {
    content: '"';
    font-family: 'Playfair Display', serif;
    font-size: 10rem;
    color: rgba(201,168,76,0.08);
    position: absolute;
    top: -2rem; left: 1rem;
    line-height: 1;
    pointer-events: none;
  }
  .scenario-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .scenario-text { font-size: 0.95rem; line-height: 1.7; color: rgba(255,255,255,0.85); margin-bottom: 1.5rem; }
  .scenario-response { font-size: 0.9rem; line-height: 1.7; }
  .scenario-response strong { color: var(--gold); }

  /* REFLECTION */
  .reflection-box {
    background: linear-gradient(135deg, #f9f5ed, #f0ebe0);
    border-radius: 12px;
    padding: 1.75rem;
    margin-bottom: 2rem;
    border-left: 4px solid var(--gold);
  }
  .reflection-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .reflection-q {
    display: flex; align-items: flex-start; gap: 0.75rem;
    margin-bottom: 0.7rem;
    font-size: 0.9rem;
    color: var(--charcoal);
    line-height: 1.5;
  }
  .reflection-q .rq-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--gold);
    flex-shrink: 0;
    margin-top: 2px;
    font-weight: 600;
  }

  /* PRINCIPLE LIST */
  .principle-list { margin-bottom: 2rem; }
  .principle-item {
    display: flex; align-items: flex-start; gap: 1rem;
    padding: 1.1rem 1.25rem;
    background: var(--white);
    border-radius: 10px;
    margin-bottom: 0.6rem;
    border: 1px solid rgba(0,0,0,0.05);
    transition: all 0.2s;
  }
  .principle-item:hover { border-color: rgba(201,168,76,0.3); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .principle-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
    line-height: 1;
    flex-shrink: 0;
    font-style: italic;
  }
  .principle-content .pc-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
  .principle-content .pc-body { font-size: 0.83rem; color: var(--muted); line-height: 1.5; }

  /* HIGHLIGHT STAT */
  .stat-row { display: flex; gap: 1rem; margin-bottom: 2rem; }
  .stat-card {
    flex: 1;
    background: var(--forest);
    color: var(--white);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--gold);
    font-style: italic;
    display: block;
    line-height: 1;
    margin-bottom: 0.35rem;
  }
  .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.6); line-height: 1.4; }

  /* CHECKLIST */
  .checklist-box {
    background: var(--white);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .checklist-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 1rem; color: var(--charcoal); }
  .check-item {
    display: flex; align-items: flex-start; gap: 0.75rem;
    padding: 0.55rem 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    cursor: pointer;
    transition: all 0.15s;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item:hover { opacity: 0.8; }
  .check-box {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.15);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    transition: all 0.2s;
  }
  .check-item.checked .check-box { background: var(--gold); border-color: var(--gold); color: var(--white); }
  .check-item.checked .check-label { text-decoration: line-through; color: var(--muted); }
  .check-label { font-size: 0.85rem; line-height: 1.5; color: var(--charcoal); }

  /* QUOTE PULL */
  .pull-quote {
    border-top: 3px solid var(--gold);
    border-bottom: 3px solid var(--gold);
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    text-align: center;
  }
  .pull-quote p {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    line-height: 1.5;
    color: var(--charcoal);
    font-style: italic;
  }
  .pull-quote cite {
    display: block;
    margin-top: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-style: normal;
  }

  /* VALUE COLOR THEMING */
  .theme-trust { --accent: var(--trust); }
  .theme-commitment { --accent: var(--commitment); }
  .theme-adaptability { --accent: var(--adaptability); }
  .theme-collaboration { --accent: var(--collaboration); }

  /* NAV FOOTER */
  .mod-nav {
    display: flex; gap: 1rem;
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(0,0,0,0.08);
  }
  .mod-nav-btn {
    padding: 0.75rem 1.75rem;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.03em;
  }
  .btn-prev { background: rgba(0,0,0,0.06); color: var(--charcoal); }
  .btn-prev:hover { background: rgba(0,0,0,0.1); }
  .btn-next { background: var(--forest); color: var(--white); }
  .btn-next:hover { background: var(--forest-light); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,58,42,0.2); }
  .btn-next.gold { background: var(--gold); color: var(--forest); }
  .btn-next.gold:hover { background: var(--gold-light); }
  .btn-spacer { flex: 1; }

  /* WELCOME MODULE */
  .welcome-hero {
    background: var(--forest);
    border-radius: 16px;
    padding: 3rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .welcome-hero::after {
    content: '';
    position: absolute;
    top: -40%; right: -10%;
    width: 300px; height: 300px;
    border-radius: 50%;
    border: 60px solid rgba(201,168,76,0.08);
    pointer-events: none;
  }
  .welcome-hero h2 {
    font-family: 'Playfair Display', serif;
    color: var(--white);
    font-size: 1.8rem;
    margin-bottom: 0.75rem;
    line-height: 1.2;
  }
  .welcome-hero h2 em { color: var(--gold); font-style: italic; }
  .welcome-hero p { color: rgba(255,255,255,0.7); font-size: 0.95rem; line-height: 1.7; max-width: 480px; font-weight: 300; }

  .values-overview { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
  .value-card {
    border-radius: 12px;
    padding: 1.5rem;
    color: var(--white);
    position: relative;
    overflow: hidden;
  }
  .value-card::before {
    content: attr(data-letter);
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-style: italic;
    font-weight: 900;
    position: absolute;
    bottom: -1rem; right: 0.5rem;
    opacity: 0.12;
    line-height: 1;
    pointer-events: none;
  }
  .value-card.trust { background: var(--trust); }
  .value-card.commitment { background: var(--commitment); }
  .value-card.adaptability { background: var(--adaptability); }
  .value-card.collaboration { background: var(--collaboration); }
  .vc-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.3rem; }
  .vc-subs { font-size: 0.75rem; opacity: 0.75; line-height: 1.6; }

  /* COMPLETE BANNER */
  .complete-banner {
    background: linear-gradient(135deg, var(--forest), var(--forest-light));
    color: var(--white);
    border-radius: 16px;
    padding: 3rem;
    text-align: center;
    margin-bottom: 2rem;
  }
  .complete-icon { font-size: 3rem; margin-bottom: 1rem; }
  .complete-banner h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 0.75rem;
    font-style: italic;
  }
  .complete-banner h2 em { color: var(--gold); }
  .complete-banner p { color: rgba(255,255,255,0.7); max-width: 500px; margin: 0 auto; line-height: 1.7; font-size: 0.95rem; }
  .pledge-items { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 2rem; }
  .pledge-item {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 1rem;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.8);
    display: flex; align-items: flex-start; gap: 0.6rem;
    text-align: left; line-height: 1.5;
  }
  .pledge-item .pi-icon { font-size: 1rem; flex-shrink: 0; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .sidebar { width: 220px; }
    .content { padding: 2rem; }
    .card-grid { grid-template-columns: 1fr; }
    .values-overview { grid-template-columns: 1fr; }
    .contrast-box { grid-template-columns: 1fr; }
    .pledge-items { grid-template-columns: 1fr; }
    .stat-row { flex-wrap: wrap; }
  }
  @media (max-width: 650px) {
    .sidebar { display: none; }
    .content { padding: 1.5rem; }
  }

  .tag-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.25rem 0.7rem;
    border-radius: 100px;
    background: rgba(0,0,0,0.06);
    color: var(--muted);
    text-transform: uppercase;
  }

  .section-header { font-weight: 600; font-size: 1rem; margin-bottom: 1rem; color: var(--charcoal); margin-top: 2rem; }
  .section-header:first-of-type { margin-top: 0; }

  .big-number {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    font-style: italic;
    color: var(--gold);
    line-height: 1;
    display: block;
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <p class="splash-label">Manager Development Program</p>
  <h1 class="splash-title">Lead to <em>Empower,</em> Not Control</h1>
  <p class="splash-sub">A training experience for new and emerging managers</p>
  <div class="splash-values">
    <span class="splash-value-pill">Trust</span>
    <span class="splash-value-pill">Commitment</span>
    <span class="splash-value-pill">Adaptability</span>
    <span class="splash-value-pill">Collaboration</span>
  </div>
  <button class="splash-btn" onclick="startTraining()">Begin Training →</button>
</div>

<!-- APP -->
<div id="app">
  <!-- TOP NAV -->
  <nav class="topnav">
    <span class="nav-brand">Lead to Empower</span>
    <div class="nav-progress-wrap">
      <span class="nav-progress-label">Progress</span>
      <div class="nav-dots" id="navDots"></div>
    </div>
  </nav>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- CONTENT -->
    <main class="content" id="contentArea"></main>
  </div>
</div>

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let lastGroup = '';
  modules.forEach((m, i) => {
    if (m.group !== lastGroup) {
      sidebar.innerHTML += `<div class="sidebar-section-label">${m.group}</div>`;
      lastGroup = m.group;
    }
    sidebar.innerHTML += `
      <div class="sidebar-item ${i === 0 ? 'active' : ''}" id="si-${i}" onclick="goTo(${i})">
        <div class="si-icon">${m.icon}</div>
        <div class="si-text">${m.label}</div>
        <div class="si-check">✓</div>
      </div>`;
  });
}

function buildContent() {
  const area = document.getElementById('contentArea');
  modules.forEach(m => {
    area.innerHTML += `<div class="module" id="mod-${m.id}">${moduleContent[m.id]}</div>`;
  });
}

function buildNavDots() {
  const dots = document.getElementById('navDots');
  modules.forEach((_, i) => {
    dots.innerHTML += `<div class="nav-dot ${i === 0 ? 'active' : ''}" id="nd-${i}" onclick="goTo(${i})"></div>`;
  });
}

function goTo(idx) {
  // Mark current as done
  done.add(currentIdx);
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-dot').forEach(d => { d.classList.remove('active'); });
  
  document.getElementById(`mod-${modules[idx].id}`).classList.add('active');
  document.getElementById(`si-${idx}`).classList.add('active');
  document.getElementById(`nd-${idx}`).classList.add('active');

  // Update done states
  done.forEach(d => {
    document.getElementById(`si-${d}`)?.classList.add('done');
    document.getElementById(`nd-${d}`)?.classList.add('done');
  });

  currentIdx = idx;
  document.querySelector('.content').scrollTop = 0;
  window.scrollTo(0, 0);
}

function toggleCheck(el) {
  el.classList.toggle('checked');
}

function startTraining() {
  document.getElementById('splash').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('app').classList.add('visible');
  }, 400);
}

function restart() {
  done.clear();
  goTo(0);
}

buildSidebar();
buildContent();
buildNavDots();
document.getElementById('mod-welcome').classList.add('active');
</script>

</html>
